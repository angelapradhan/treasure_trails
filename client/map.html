<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treasure Trails - Expedition Map</title>
  <meta name="description" content="Browse the Nepal treasure hunt trail and choose your next expedition.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C5A059;
      --gold-dark: #9e7d3b;
      --gold-light: #e5c382;
      --bg-darker: #080808;
      --border-color: #2a2a2a;
      --text-gray: #aaaaaa;
      --text-light: #e0e0e0;
      --play-green: #5cb85c;
      --play-green-dark: #449d44;
      --map-void: #000000;
      --map-deep: #030810;
      --map-face: #0a1830;
      --map-face-hi: #143352;
      --map-edge: rgba(20, 55, 90, 0.45);
      --trail-cyan: #00e8ff;
      --trail-cyan-core: #5ff4ff;
      --trail-cyan-glow: rgba(0, 232, 255, 0.5);
      --pin-hot: #ffeb3b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-darker);
      color: var(--text-light);
      font-family: 'Outfit', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #111;
      border-bottom: 2px solid var(--gold);
      padding: 0 30px;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    .logo {
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 1.3rem;
      text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
    }
    .header-right { display: flex; align-items: center; gap: 15px; }
    .stat-pill {
      background: #161616;
      border: 1px solid var(--border-color);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 0.85rem;
      display: flex; align-items: center; gap: 8px;
    }
    .stat-pill span { color: var(--gold); font-weight: 800; }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(197,160,89,0.4);
      color: var(--gold);
      padding: 7px 18px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .back-btn:hover { background: var(--gold); color: #000; }

    /* ── RPG world map — realistic mountain backdrop ─────────────── */
    #screen-trail {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      background: #050505;
    }
    .trail-top-bar {
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 5;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.88) 0%, transparent 100%);
    }
    .trail-top-bar h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 2px;
    }
    .region-banner {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 5px 14px;
      border: 1px solid rgba(197, 160, 89, 0.45);
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.55);
    }
    .trail-scroll-hint {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.45);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .trail-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
      min-height: 0;
    }
    .trail-viewport.dragging { cursor: grabbing; }
    .trail-scroll {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      will-change: transform;
      transition: transform 0.05s linear;
    }
    .trail-scroll.snap { transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1); }

    .trail-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .trail-bg-photo {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1454496522488-786a6393abfe?q=85&w=3200&auto=format&fit=crop');
      background-size: cover;
      background-position: center 40%;
      background-repeat: no-repeat;
    }
    .trail-bg-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0.12) 35%, rgba(0, 0, 0, 0.25) 70%, rgba(0, 0, 0, 0.72) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.45) 0%, transparent 8%, transparent 92%, rgba(0, 0, 0, 0.45) 100%);
      z-index: 1;
    }

    .trail-canvas-wrap {
      position: relative;
      height: 100%;
      min-width: 100%;
    }

    .trail-route-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: visible;
    }
    .trail-route-svg .route-shadow {
      fill: none;
      stroke: rgba(0, 0, 0, 0.45);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .trail-route-svg .route-bed {
      fill: none;
      stroke: rgba(90, 70, 45, 0.75);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .trail-route-svg .route-core {
      fill: none;
      stroke: rgba(255, 248, 220, 0.9);
      stroke-width: 3;
      stroke-dasharray: 4 12;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.35));
    }

    .region-progress {
      position: absolute;
      bottom: 16px;
      right: 20px;
      z-index: 6;
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid rgba(197, 160, 89, 0.45);
      border-radius: 6px;
      padding: 10px 16px;
      min-width: 180px;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
    .region-progress .rp-title {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      font-weight: 800;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }
    .region-progress .rp-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .region-progress .rp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .region-progress .rp-stars {
      font-size: 0.72rem;
      color: #ffd700;
      letter-spacing: 2px;
    }

    /* RPG level nodes */
    .trail-nodes {
      position: absolute;
      inset: 0;
      z-index: 4;
    }
    .trail-node {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .trail-node:hover { transform: translate(-50%, -52%) scale(1.05); }
    .trail-node.selected { transform: translate(-50%, -54%) scale(1.08); z-index: 6; }

    .level-badge {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid #b8b8b8;
      background: linear-gradient(160deg, #3a3a3a 0%, #141414 55%, #0a0a0a 100%);
      box-shadow:
        0 4px 14px rgba(0, 0, 0, 0.65),
        inset 0 2px 6px rgba(255, 255, 255, 0.12),
        inset 0 -3px 6px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 1.35rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      position: relative;
    }
    .trail-node.selected .level-badge {
      border-color: var(--gold);
      box-shadow:
        0 0 22px rgba(197, 160, 89, 0.65),
        0 4px 14px rgba(0, 0, 0, 0.65),
        inset 0 2px 6px rgba(255, 255, 255, 0.15);
      animation: levelPulse 2s ease-in-out infinite;
    }
    @keyframes levelPulse {
      0%, 100% { box-shadow: 0 0 18px rgba(197, 160, 89, 0.5), 0 4px 14px rgba(0,0,0,0.65); }
      50% { box-shadow: 0 0 28px rgba(197, 160, 89, 0.85), 0 4px 14px rgba(0,0,0,0.65); }
    }
    .trail-node.boss .level-badge {
      width: 68px;
      height: 68px;
      border-color: #c0392b;
      font-size: 0.58rem;
      letter-spacing: 1px;
      line-height: 1.1;
      text-align: center;
      padding: 0 4px;
    }
    .trail-node.locked .level-badge {
      filter: grayscale(0.85) brightness(0.55);
      border-color: #555;
    }
    .trail-node.completed .level-badge {
      border-color: #4dfa62;
    }
    .level-lock {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .level-stars {
      font-size: 0.55rem;
      color: #ffd700;
      letter-spacing: 2px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
      min-height: 10px;
    }
    .level-stars.empty { color: rgba(255, 255, 255, 0.25); }
    .node-label {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      max-width: 100px;
      text-align: center;
      line-height: 1.2;
      padding: 3px 8px;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(197, 160, 89, 0.35);
      border-radius: 3px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
    }
    .trail-node.selected .node-label {
      border-color: var(--gold);
      background: rgba(20, 16, 8, 0.88);
    }
    .level-tag {
      position: absolute;
      top: -8px;
      right: -10px;
      background: var(--gold);
      color: #000;
      font-size: 0.5rem;
      font-weight: 900;
      padding: 2px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Scroll arrows */
    .trail-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 8;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: 2px solid var(--gold);
      color: var(--gold);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }
    .trail-arrow:hover { background: var(--gold); color: #000; }
    .trail-arrow.left { left: 12px; }
    .trail-arrow.right { right: 12px; }
    .trail-arrow.hidden { opacity: 0; pointer-events: none; }

    /* Bottom map detail panel */
    .map-detail-panel {
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(10, 14, 22, 0.98) 0%, rgba(4, 6, 10, 0.99) 100%);
      border-top: 2px solid rgba(197, 160, 89, 0.55);
      padding: 14px 24px 16px;
      display: flex;
      gap: 20px;
      align-items: center;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.6);
      z-index: 10;
      min-height: 0;
    }
    .detail-thumb {
      width: 120px; height: 90px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      border: 2px solid rgba(197, 160, 89, 0.45);
      flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(0,0,0,0.5);
    }
    .detail-info {
      flex: 1;
      min-width: 0;
      overflow: visible;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }
    .detail-info h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .detail-zone {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .detail-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.78rem;
      color: var(--text-gray);
    }
    .detail-meta span { display: flex; align-items: center; gap: 5px; }
    .diff-stars { color: #ffd700; letter-spacing: 1px; }
    .detail-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-play {
      background: linear-gradient(180deg, #6fcf6f 0%, var(--play-green) 50%, var(--play-green-dark) 100%);
      color: #fff;
      border: none;
      border-bottom: 4px solid #357935;
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 6px 0 #2d6b2d, 0 8px 20px rgba(0,0,0,0.35);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      min-width: 160px;
    }
    .btn-play:hover { filter: brightness(1.08); }
    .btn-play:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #2d6b2d, 0 5px 12px rgba(0,0,0,0.3);
    }
    .btn-unlock {
      background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
      color: #000;
      border: none;
      border-bottom: 4px solid #6b5018;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 6px 0 #5a4010, 0 8px 20px rgba(0,0,0,0.35);
      min-width: 160px;
    }
    .btn-unlock:active { transform: translateY(3px); box-shadow: 0 3px 0 #5a4010; }
    .btn-nav-mini {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
    }
    .btn-nav-mini:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .btn-nav-mini:disabled { opacity: 0.35; cursor: default; }

    .hud-footer {
      background: #0d0d0d;
      border-top: 1px solid #1a1a1a;
      height: 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      z-index: 10;
      flex-shrink: 0;
    }
    .footer-left { display: flex; align-items: center; gap: 15px; }
    .footer-left .age-pill {
      border: 1px solid #444; padding: 2px 6px; border-radius: 3px;
      font-size: 0.65rem; font-weight: bold; color: #999;
    }
    .footer-left .prod-text {
      font-size: 0.7rem; color: #666; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .game-notification {
      position: fixed; top: 80px; right: 30px;
      background: rgba(197, 160, 89, 0.95); color: #000;
      padding: 12px 25px; border-radius: 5px; font-weight: bold; font-size: 0.9rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 200;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .game-notification.show-notif { transform: translateX(0); }

    @media (max-width: 700px) {
      header { height: 56px; padding: 0 16px; }
      .trail-top-bar { padding: 10px 16px 6px; }
      .trail-top-bar h1 { font-size: 1.1rem; }
      .trail-scroll-hint { display: none; }
      .map-detail-panel {
        flex-wrap: wrap;
        padding: 12px 16px 14px;
        gap: 12px;
      }
      .detail-thumb { width: 72px; height: 54px; }
      .detail-info h2 { font-size: 1.05rem; }
      .detail-meta { display: none; }
      .detail-actions { width: 100%; flex-direction: row; }
      .btn-play, .btn-unlock { flex: 1; padding: 12px 16px; font-size: 0.85rem; }
      .hud-footer { height: 36px; padding: 0 16px; }
      .region-progress { bottom: 10px; right: 10px; min-width: 140px; padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <div id="notification" class="game-notification"></div>

  <header>
    <div class="logo">Nepal Treasure Hunt</div>
    <div class="header-right">
      <div class="stat-pill">LVL <span id="player-lvl">14</span></div>
      <div class="stat-pill">Gold: <span id="coin-count">1,250</span></div>
      <button class="back-btn" onclick="goToDashboard()">← Back to Hub</button>
    </div>
  </header>

  <div id="screen-trail">
    <div class="trail-top-bar">
      <h1>Expedition Trail</h1>
      <span class="region-banner" id="region-banner">Nepal · Himal Route</span>
      <span class="trail-scroll-hint">← Drag map →</span>
    </div>

    <div class="trail-viewport" id="trail-viewport">
      <button class="trail-arrow left hidden" id="arrow-left" aria-label="Scroll left">‹</button>
      <button class="trail-arrow right" id="arrow-right" aria-label="Scroll right">›</button>

      <div class="region-progress">
        <div class="rp-title">Region Progress</div>
        <div class="rp-bar"><div class="rp-fill" id="progress-fill"></div></div>
        <div class="rp-stars" id="progress-stars">★☆☆ 0 / 18</div>
      </div>

      <div class="trail-scroll" id="trail-scroll">
        <div class="trail-canvas-wrap" id="trail-canvas-wrap">
          <div class="trail-bg">
            <div class="trail-bg-photo"></div>
            <div class="trail-bg-overlay"></div>
          </div>
          <svg class="trail-route-svg" id="trail-route-svg" preserveAspectRatio="none">
            <path class="route-shadow" id="route-shadow"></path>
            <path class="route-bed" id="route-bed"></path>
            <path class="route-core" id="route-core"></path>
          </svg>
          <div class="trail-nodes" id="trail-nodes"></div>
        </div>
      </div>
    </div>

    <div class="map-detail-panel" id="map-detail-panel">
      <div class="detail-thumb" id="detail-thumb"></div>
      <div class="detail-info">
        <h2 id="detail-name">Lumbini Garden</h2>
        <div class="detail-zone" id="detail-zone">Terai · Terai Plains</div>
        <div class="detail-meta">
          <span><span class="diff-stars" id="detail-stars">★★☆</span> <span id="detail-diff-label">Easy</span></span>
          <span>🏆 <span id="detail-treasures">4</span> Treasures</span>
          <span>⛰ <span id="detail-altitude">150</span>m</span>
          <span id="detail-status">Ready to play</span>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn-play" id="btn-primary" onclick="handlePrimaryAction()">▶ Play</button>
        <div style="display:flex;gap:6px;">
          <button class="btn-nav-mini" id="btn-prev" onclick="selectAdjacent(-1)">‹ Prev</button>
          <button class="btn-nav-mini" id="btn-next" onclick="selectAdjacent(1)">Next ›</button>
        </div>
      </div>
    </div>
  </div>

  <div class="hud-footer">
    <div class="footer-left">
      <div class="age-pill">12+</div>
      <div class="prod-text">Nepal Treasure Hunt v2.4 Production</div>
    </div>
  </div>

  <script>
    'use strict';

    let state = {
      coins: parseInt(localStorage.getItem('nt_coins')) || 1250,
      level: parseInt(localStorage.getItem('nt_level')) || 14,
      activeCharacterId: localStorage.getItem('nt_active_char') || 'char_1',
      unlockedMaps: JSON.parse(localStorage.getItem('nt_unlocked_maps')) || ['mustang_pass', 'valley_expedition', 'lumbini_garden'],
      forgottenPassUnlocked: localStorage.getItem('nt_forgotten_pass') === 'true',
      completedMaps: JSON.parse(localStorage.getItem('nt_completed_maps') || '[]')
    };

    const urlParams = new URLSearchParams(window.location.search);
    const selectedChar = urlParams.get('selectedChar') || state.activeCharacterId;

    const DIFF_STARS = { Easy: '★☆☆', Medium: '★★☆', Hard: '★★★' };

    /* Trail maps sorted low → high altitude */
    const TRAIL_MAPS = [
      {
        id: 'lumbini_garden',
        name: 'Lumbini Garden',
        region: 'Terai',
        zone: 'Terai Plains',
        altitude: 150,
        difficulty: 'Easy',
        cost: 0,
        treasures: 4,
        img: 'https://images.unsplash.com/photo-1589909202802-8f4aadce1849?q=80&w=600',
        file: 'lumbini.html',

      {

        name: 'The Forgotten Pass',
        region: 'Summit',

        treasures: 6,
        img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=600',
        file: 'mustang.html',
        emoji: '⚡',
        special: true,
        reqLevel: 10
      }
    ].sort((a, b) => a.altitude - b.altitude);

    const NODE_LAYOUT = [
      { x: 0.11, y: 0.76 },
      { x: 0.27, y: 0.60 },
      { x: 0.43, y: 0.70 },
      { x: 0.57, y: 0.52 },
      { x: 0.73, y: 0.64 },
      { x: 0.89, y: 0.42 }
    ];
    let canvasWidth = 0;
    let selectedIndex = 0;
    let scrollX = 0;
    let isDragging = false;
    let dragStartX = 0;
    let scrollStartX = 0;

    function getTrailHeight() {
      const viewport = document.getElementById('trail-viewport');
      return Math.max(280, viewport.clientHeight);
    }

    function getCanvasWidth() {
      const vp = document.getElementById('trail-viewport');
      return Math.max(1200, vp.clientWidth * 1.5);
    }

    function nodePosition(index) {
      const w = canvasWidth || getCanvasWidth();
      const h = getTrailHeight();
      const layout = NODE_LAYOUT[index] || NODE_LAYOUT[0];
      return { x: layout.x * w, y: layout.y * h };
    }

    function buildWorldPath() {
      const pts = TRAIL_MAPS.map((_, i) => nodePosition(i));
      if (pts.length < 2) return '';
      let d = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
      for (let i = 1; i < pts.length; i++) {
        const prev = pts[i - 1];
        const curr = pts[i];
        const cpx = (prev.x + curr.x) / 2;
        const cpy = (prev.y + curr.y) / 2 + (i % 2 === 0 ? -28 : 28);
        d += ` Q ${cpx.toFixed(1)} ${cpy.toFixed(1)} ${curr.x.toFixed(1)} ${curr.y.toFixed(1)}`;
      }
      return d;
    }

    function renderRoute() {
      const d = buildWorldPath();
      ['route-shadow', 'route-bed', 'route-core'].forEach(id => {
        document.getElementById(id).setAttribute('d', d);
      });
    }

    function starCountForMap(map) {
      if (!state.completedMaps.includes(map.id)) return 0;
      if (map.difficulty === 'Hard') return 3;
      if (map.difficulty === 'Medium') return 2;
      return 1;
    }

    function getNodeStarsDisplay(map) {
      const n = starCountForMap(map);
      if (n === 0) return { text: '☆☆☆', empty: true };
      return { text: '★'.repeat(n) + '☆'.repeat(3 - n), empty: false };
    }

    function updateRegionProgress() {
      const maxStars = TRAIL_MAPS.length * 3;
      let earned = 0;
      TRAIL_MAPS.forEach(m => { earned += starCountForMap(m); });
      const pct = maxStars > 0 ? (earned / maxStars) * 100 : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-stars').textContent =
        `${'★'.repeat(earned)}${'☆'.repeat(Math.max(0, maxStars - earned))}  ${earned} / ${maxStars}`;
    }

    function renderTrail() {
      const totalWidth = getCanvasWidth();
      const trailHeight = getTrailHeight();
      canvasWidth = totalWidth;
      const wrap = document.getElementById('trail-canvas-wrap');
      wrap.style.width = totalWidth + 'px';
      wrap.style.height = trailHeight + 'px';

      renderRoute();
      updateRegionProgress();

      const nodesEl = document.getElementById('trail-nodes');
      nodesEl.innerHTML = '';

      TRAIL_MAPS.forEach((map, i) => {
        const pos = nodePosition(i);
        const unlocked = isMapUnlocked(map);
        const isBoss = !!map.special;
        const stars = getNodeStarsDisplay(map);
        const node = document.createElement('div');
        node.className = 'trail-node'
          + (unlocked ? '' : ' locked')
          + (state.completedMaps.includes(map.id) ? ' completed' : '')
          + (i === selectedIndex ? ' selected' : '')
          + (isBoss ? ' boss' : '');
        node.style.left = pos.x + 'px';
        node.style.top = pos.y + 'px';
        node.dataset.index = i;
        node.innerHTML = `
          <div class="level-badge">
            ${isBoss ? 'BOSS' : (i + 1)}
            ${!unlocked ? '<span class="level-lock">🔒</span>' : ''}
            ${map.cost > 0 && unlocked ? '' : ''}
          </div>
          <div class="level-stars${stars.empty ? ' empty' : ''}">${stars.text}</div>
          <span class="node-label">${map.name}</span>
        `;
        node.onclick = () => selectMap(i);
        nodesEl.appendChild(node);
      });

      applyScrollTransform(false);
    }

    function isMapUnlocked(map) {
      if (map.id === 'forgotten_pass') {
        return state.forgottenPassUnlocked || state.level >= (map.reqLevel || 10);
      }
      return map.cost === 0 || state.unlockedMaps.includes(map.id);
    }

    function getMapById(id) {
      return TRAIL_MAPS.find(m => m.id === id);
    }

    function updateHUD() {
      document.getElementById('coin-count').innerText = state.coins.toLocaleString();
      document.getElementById('player-lvl').innerText = state.level;
    }

    function goToDashboard() {
      window.location.href = 'dashboard.html';
    }

    function selectMap(index) {
      if (index < 0 || index >= TRAIL_MAPS.length) return;
      selectedIndex = index;
      document.querySelectorAll('.trail-node').forEach((n, i) => {
        n.classList.toggle('selected', i === index);
      });
      updateDetailPanel();
      centerOnSelected(true);
    }

    function selectAdjacent(dir) {
      selectMap(selectedIndex + dir);
    }

    function updateDetailPanel() {
      const map = TRAIL_MAPS[selectedIndex];
      const unlocked = isMapUnlocked(map);
      document.getElementById('detail-thumb').style.backgroundImage = `url('${map.img}')`;
      document.getElementById('detail-zone').innerText = `${map.region} · ${map.zone}`;
      document.getElementById('region-banner').textContent = `${map.region} · ${map.zone}`;
      document.getElementById('detail-name').innerText = map.name;
      document.getElementById('detail-stars').innerText = DIFF_STARS[map.difficulty] || '★★☆';
      document.getElementById('detail-diff-label').innerText = map.difficulty;
      document.getElementById('detail-treasures').innerText = map.treasures;
      document.getElementById('detail-altitude').innerText = map.altitude.toLocaleString();

      const statusEl = document.getElementById('detail-status');
      const btn = document.getElementById('btn-primary');

      if (unlocked) {
        statusEl.innerText = state.completedMaps.includes(map.id) ? 'Completed — replay anytime' : 'Ready to play';
        btn.className = 'btn-play';
        btn.innerHTML = '▶ Play';
      } else if (map.special) {
        statusEl.innerText = `Requires LVL ${map.reqLevel} or Access Pass`;
        btn.className = 'btn-unlock';
        btn.innerHTML = `🔒 Unlock · ${map.cost} G`;
      } else {
        statusEl.innerText = `Locked — ${map.cost} gold to unlock`;
        btn.className = 'btn-unlock';
        btn.innerHTML = `🔒 Unlock · ${map.cost} G`;
      }

      document.getElementById('btn-prev').disabled = selectedIndex === 0;
      document.getElementById('btn-next').disabled = selectedIndex === TRAIL_MAPS.length - 1;
    }

    function handlePrimaryAction() {
      const map = TRAIL_MAPS[selectedIndex];
      if (isMapUnlocked(map)) {
        enterMap(map.id);
      } else {
        buyMapUnlock(map.id, map.cost, map.special);
      }
    }

    function enterMap(mapId) {
      const map = getMapById(mapId);
      if (!map) return;
      window.location.href = `${map.file}?selectedChar=${selectedChar}`;
    }

    function buyMapUnlock(mapId, cost, isSpecial) {
      if (mapId === 'forgotten_pass') {
        if (state.level >= 10) {
          state.forgottenPassUnlocked = true;
          localStorage.setItem('nt_forgotten_pass', 'true');
          renderTrail();
          updateDetailPanel();
          showNotif('Summit access granted!');
          return;
        }
      }
      if (state.coins >= cost) {
        state.coins -= cost;
        if (mapId === 'forgotten_pass') {
          state.forgottenPassUnlocked = true;
          localStorage.setItem('nt_forgotten_pass', 'true');
        } else {
          state.unlockedMaps.push(mapId);
          localStorage.setItem('nt_unlocked_maps', JSON.stringify(state.unlockedMaps));
        }
        localStorage.setItem('nt_coins', state.coins);
        updateHUD();
        renderTrail();
        updateDetailPanel();
        showNotif('Trail unlocked!');
      } else {
        alert('Not enough gold! Complete maps to earn more.');
      }
    }

    function showNotif(text) {
      const el = document.getElementById('notification');
      el.textContent = text;
      el.classList.add('show-notif');
      setTimeout(() => el.classList.remove('show-notif'), 3000);
    }

    /* Horizontal scroll / drag (HCR map browse) */
    function getMaxScroll() {
      const viewport = document.getElementById('trail-viewport');
      const wrap = document.getElementById('trail-canvas-wrap');
      return Math.max(0, wrap.offsetWidth - viewport.clientWidth);
    }

    function clampScroll(x) {
      return Math.max(-getMaxScroll(), Math.min(0, x));
    }

    function applyScrollTransform(animate) {
      const el = document.getElementById('trail-scroll');
      el.classList.toggle('snap', animate);
      el.style.transform = `translateX(${scrollX}px)`;
      updateArrows();
    }

    function centerOnSelected(animate) {
      const viewport = document.getElementById('trail-viewport');
      const pos = nodePosition(selectedIndex);
      const target = clampScroll(-(pos.x - viewport.clientWidth / 2));
      scrollX = target;
      applyScrollTransform(animate);
    }

    function updateArrows() {
      const max = getMaxScroll();
      document.getElementById('arrow-left').classList.toggle('hidden', scrollX >= -5);
      document.getElementById('arrow-right').classList.toggle('hidden', scrollX <= -(max - 5));
    }

    function setupScrollInteraction() {
      const viewport = document.getElementById('trail-viewport');

      viewport.addEventListener('mousedown', e => {
        if (e.target.closest('.trail-node, .trail-arrow, .btn-play, .btn-unlock')) return;
        isDragging = true;
        dragStartX = e.clientX;
        scrollStartX = scrollX;
        viewport.classList.add('dragging');
        document.getElementById('trail-scroll').classList.remove('snap');
      });
      window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        scrollX = clampScroll(scrollStartX + (e.clientX - dragStartX));
        applyScrollTransform(false);
      });
      window.addEventListener('mouseup', () => {
        isDragging = false;
        viewport.classList.remove('dragging');
      });

      viewport.addEventListener('touchstart', e => {
        if (e.target.closest('.trail-node, .trail-arrow')) return;
        isDragging = true;
        dragStartX = e.touches[0].clientX;
        scrollStartX = scrollX;
        document.getElementById('trail-scroll').classList.remove('snap');
      }, { passive: true });
      viewport.addEventListener('touchmove', e => {
        if (!isDragging) return;
        scrollX = clampScroll(scrollStartX + (e.touches[0].clientX - dragStartX));
        applyScrollTransform(false);
      }, { passive: true });
      viewport.addEventListener('touchend', () => { isDragging = false; });

      viewport.addEventListener('wheel', e => {
        e.preventDefault();
        scrollX = clampScroll(scrollX - e.deltaY * 0.8 - e.deltaX * 0.8);
        applyScrollTransform(false);
      }, { passive: false });

      document.getElementById('arrow-left').onclick = () => {
        scrollX = clampScroll(scrollX + 280);
        applyScrollTransform(true);
      };
      document.getElementById('arrow-right').onclick = () => {
        scrollX = clampScroll(scrollX - 280);
        applyScrollTransform(true);
      };

      window.addEventListener('resize', () => {
        renderTrail();
        centerOnSelected(false);
      });
    }

    window.onload = function () {
      updateHUD();
      renderTrail();
      const firstUnlocked = TRAIL_MAPS.findIndex(m => isMapUnlocked(m));
      selectMap(firstUnlocked >= 0 ? firstUnlocked : 0);
      setupScrollInteraction();
    };
  </script>
