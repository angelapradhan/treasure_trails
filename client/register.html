<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treasure Trails - Register</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page-body">
  <nav class="nav-container auth-nav">
    <div class="nav-left">
      <a href="index.html" class="logo-link">
        <span class="mini-logo">TREASURE <br> TRAILS</span>
      </a>
    </div>
    <ul class="nav-menu">
      <li><a href="index.html">Welcome</a></li>
      <li>News</li>
      <li>Explore</li>
      <li>Gear</li>
      <li>Community</li>
    </ul>
    <div class="nav-right">
      <a href="login.html" class="btn-nav outline">Login</a>
    </div>
  </nav>

  <main class="split-container">
    <div class="visual-side">
      <div class="image-stack">
        <div class="stack-img ghost-2"></div>
        <div class="stack-img ghost-1"></div>
        <div class="stack-img main" style="background-image: url('images/land.webp');"></div>
      </div>
      <div class="slider-dots">
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
    </div>

    <div class="form-side">
      <div class="login-box">
        <h2>Join the Society of Trails</h2>
        <p class="form-subtext">Create your account to uncover hidden secrets and unlock exclusive rewards across the province.</p>

        <form id="registerForm">
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" placeholder="Name" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="Email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Password" required autocomplete="new-password">
          </div>

          <button type="submit" class="btn-gold-large">Register</button>

          <div class="separator"><span>or</span></div>

          <button type="button" class="btn-google-auth">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G" width="18">
          </button>
        </form>

        <p class="switch-auth">
            Already have an account? <a href="login.html">LOG IN</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevents default form layout refresh flow

        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        try {
            // Express API endpoint server local initialization context rules path
            const response = await fetch('http://localhost:5000/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                alert('Registration Successful!');
                window.location.href = 'login.html'; // Redirects straight to login view portal
            } else {
                alert(data.message || 'Registration structural failure.');
            }
        } catch (error) {
            console.error('API System Error:', error);
            alert('Unable to target server database stream. Ensure your local server engine is actively running.');
        }
    });
  </script>
</body>

</html>
